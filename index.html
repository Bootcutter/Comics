<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Comic Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --card: #222;
      --accent: #ff4d6d;
      --accent2: #c9184a;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Hero header */
    .hero {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      background: linear-gradient(180deg, #1a1a2e 0%, var(--bg) 100%);
    }
    .hero h1 {
      font-size: 2.8rem; font-weight: 800; letter-spacing: -.03em;
      background: linear-gradient(135deg, #ff4d6d, #ff8fa3, #ff4d6d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero p { color: var(--muted); margin-top: .4rem; font-size: .95rem; }
    .stats { display: flex; justify-content: center; gap: 2rem; margin-top: 1.2rem; }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }

    /* Controls */
    .controls {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 1.5rem;
      display: flex; gap: .6rem; flex-wrap: wrap;
    }
    .search-wrap { flex: 1; min-width: 220px; position: relative; }
    .search-wrap svg {
      position: absolute; left: .8rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--muted); pointer-events: none;
    }
    .controls input {
      width: 100%; padding: .65rem .8rem .65rem 2.4rem;
      border: 1px solid #333; border-radius: var(--radius);
      background: var(--surface); color: var(--text); font-size: .88rem;
      font-family: inherit; transition: border-color .2s;
    }
    .controls input:focus { outline: none; border-color: var(--accent); }
    .controls select {
      padding: .65rem .8rem; border: 1px solid #333; border-radius: var(--radius);
      background: var(--surface); color: var(--text); font-size: .88rem;
      font-family: inherit; min-width: 140px; cursor: pointer;
    }
    .controls select:focus { outline: none; border-color: var(--accent); }

    /* Grid */
    .grid {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.2rem;
    }

    /* Cover card */
    .card {
      position: relative; border-radius: var(--radius); overflow: hidden;
      cursor: default; transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover { transform: scale(1.04); box-shadow: 0 12px 40px rgba(0,0,0,.5); z-index: 2; }
    .card-cover {
      width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block;
      background: #2a2a2a; border-radius: var(--radius);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.92) 0%, rgba(0,0,0,.4) 40%, transparent 60%);
      opacity: 0; transition: opacity .25s;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: .8rem; border-radius: var(--radius);
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-overlay .title { font-size: .82rem; font-weight: 700; line-height: 1.2; margin-bottom: .2rem; }
    .card-overlay .authors { font-size: .68rem; color: #bbb; line-height: 1.3; }
    .card-overlay .tag {
      display: inline-block; margin-top: .3rem;
      background: var(--accent); color: #fff;
      padding: .12rem .4rem; border-radius: 4px;
      font-size: .6rem; font-weight: 600; text-decoration: none; width: fit-content;
    }
    .card-overlay .tag:hover { background: var(--accent2); }
    .card-overlay a { color: #ddd; text-decoration: none; border: none; }
    .card-overlay a:hover { color: #fff; }
    .series-indicator {
      position: absolute; top: .5rem; right: .5rem;
      background: var(--accent); color: #fff;
      font-size: .6rem; font-weight: 700;
      padding: .2rem .45rem; border-radius: 4px;
      pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .no-cover-card {
      width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(135deg, #1a1a2e, #2a2a4a);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: var(--muted); text-align: center; padding: .5rem;
    }

    /* Drawer */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px); z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0;
      width: 0; height: 100vh;
      background: var(--surface);
      z-index: 101;
      transition: width .4s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
      box-shadow: -8px 0 40px rgba(0,0,0,.6);
      display: flex; flex-direction: row;
    }
    .drawer-overlay.open .drawer { width: min(1100px, 92vw); }

    .drawer-close {
      position: absolute; top: .8rem; right: .8rem; z-index: 5;
      background: rgba(0,0,0,.5); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .drawer-close:hover { background: var(--accent); }

    /* LEFT: Preview panel — full height */
    .drawer-preview {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2.5rem 2rem;
      overflow-y: auto;
      background: #141414;
    }
    .drawer-preview img {
      width: 100%; max-width: 300px; border-radius: 10px;
      box-shadow: 0 12px 50px rgba(0,0,0,.7);
      transition: opacity .25s;
    }
    .drawer-preview-title {
      font-size: 1.1rem; font-weight: 700; margin-top: 1.2rem; text-align: center;
    }
    .drawer-preview-desc {
      font-size: .85rem; color: var(--muted); margin-top: .6rem;
      line-height: 1.6; text-align: center; max-width: 340px;
    }

    /* RIGHT: Header + list */
    .drawer-right {
      width: 340px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-left: 1px solid #2a2a2a;
      height: 100vh;
    }

    .drawer-hero {
      position: relative; flex-shrink: 0;
      padding: 0;
    }
    .drawer-hero-img {
      width: 100%; aspect-ratio: 16/10; object-fit: cover;
      filter: brightness(.45); display: block;
    }
    .drawer-hero-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1rem; background: linear-gradient(0deg, var(--surface) 10%, transparent);
    }
    .drawer-hero-info .title { font-size: 1.15rem; font-weight: 700; }
    .drawer-hero-info .sub { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
    .drawer-hero-info .authors { font-size: .75rem; color: #bbb; margin-top: .25rem; }
    .drawer-hero-info .authors a { color: #ccc; border: none; }
    .drawer-hero-info .authors a:hover { color: var(--accent); }
    .drawer-hero-info .tag {
      display: inline-block; margin-top: .35rem;
      background: var(--accent); color: #fff;
      padding: .12rem .45rem; border-radius: 4px;
      font-size: .65rem; font-weight: 600; text-decoration: none;
    }

    /* Volume list */
    .drawer-list {
      flex: 1; overflow-y: auto; padding: .3rem 0;
    }
    .drawer-item {
      display: flex; gap: .7rem; padding: .55rem .8rem;
      align-items: center; transition: background .15s;
      cursor: pointer; border-left: 3px solid transparent;
    }
    .drawer-item:hover { background: rgba(255,255,255,.04); }
    .drawer-item.active {
      background: rgba(255,77,109,.08);
      border-left-color: var(--accent);
    }
    .drawer-item img {
      width: 36px; height: 50px; object-fit: cover;
      border-radius: 4px; background: #2a2a2a; flex-shrink: 0;
    }
    .drawer-item-title { font-size: .8rem; font-weight: 500; }

    /* Not-owned volumes */
    .drawer-item.not-owned { opacity: .45; }
    .drawer-item.not-owned img { filter: grayscale(1); }
    .drawer-item-status {
      font-size: .6rem; text-transform: uppercase; letter-spacing: .05em;
      padding: .1rem .35rem; border-radius: 3px; margin-left: auto; flex-shrink: 0;
    }
    .status-missing { background: #333; color: #888; }
    .status-unreleased { background: rgba(255,77,109,.15); color: var(--accent); }

    /* Single detail mode — no right column */
    .drawer.single-mode { justify-content: center; }
    .drawer.single-mode .drawer-preview {
      max-width: 500px; padding: 3rem 2rem;
    }
    .drawer.single-mode .drawer-preview img { max-width: 350px; }
    .drawer-preview-authors {
      font-size: .8rem; color: #aaa; margin-top: .5rem; text-align: center;
    }
    .drawer-preview-authors a { color: #bbb; border: none; }
    .drawer-preview-authors a:hover { color: var(--accent); }
    .drawer-preview .tag {
      display: inline-block; margin-top: .5rem;
      background: var(--accent); color: #fff;
      padding: .12rem .45rem; border-radius: 4px;
      font-size: .65rem; font-weight: 600; text-decoration: none;
    }

    .count {
      text-align: center; color: var(--muted);
      padding: 2rem 1rem; font-size: .8rem;
    }

    @media (max-width: 700px) {
      .hero h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: .8rem; padding: 0 .8rem; }
      .controls { padding: 0 .8rem 1rem; }
      .drawer-overlay.open .drawer { width: 100vw; }
      .drawer { flex-direction: column-reverse; }
      .drawer-right { width: 100%; height: auto; max-height: 45vh; border-left: none; border-top: 1px solid #2a2a2a; }
      .drawer-preview { padding: 1.2rem; }
      .drawer-preview img { max-width: 180px; }
      .drawer.single-mode .drawer-preview { padding: 2rem 1rem; }
      .drawer.single-mode .drawer-preview img { max-width: 200px; }
    }
  </style>
</head>

// Combine for filtering
var allEntries = [];
var i;
for (i = 0; i < singles.length; i++) {
  var s = singles[i]; s.type = "single"; allEntries.push(s);
}
for (i = 0; i < series.length; i++) {
  var sr = series[i]; sr.type = "series"; sr.seriesIdx = i; allEntries.push(sr);
}

// Stats
var totalVols = singles.length;
for (i = 0; i < series.length; i++) {
  for (var j = 0; j < series[i].items.length; j++) {
    if (series[i].items[j].owned !== false) totalVols++;
  }
}
var allPubs = [];
for (i = 0; i < allEntries.length; i++) {
  var p = allEntries[i].publisher;
  if (p && allPubs.indexOf(p) < 0) allPubs.push(p);
}
allPubs.sort();
document.getElementById("statEntries").textContent = allEntries.length;
document.getElementById("statVolumes").textContent = totalVols;
document.getElementById("statPubs").textContent = allPubs.length;

// Publisher filter
var sel = document.getElementById("publisherFilter");
for (i = 0; i < allPubs.length; i++) {
  var o = document.createElement("option");
  o.value = allPubs[i]; o.textContent = allPubs[i];
  sel.appendChild(o);
}

function strip(html) { return html.replace(/<[^>]*>/g, ""); }

function pubTag(publisher) {
  if (!publisher) return "";
  var url = pub_urls[publisher];
  return url
    ? '<a class="tag" href="' + url + '" target="_blank">' + publisher + '</a>'
    : '<span class="tag">' + publisher + '</span>';
}

// Drawer state
var activeItemIdx = -1;

function openDrawer(idx) {
  var s = series[idx];
  if (!s) return;
  activeItemIdx = 0;
  var drawer = document.getElementById("drawer");
  drawer.innerHTML = "";
  drawer.className = "drawer";

  // LEFT: Preview panel (full height)
  var preview = document.createElement("div");
  preview.className = "drawer-preview";
  preview.id = "drawerPreview";
  drawer.appendChild(preview);

  // RIGHT: Header + list column
  var right = document.createElement("div");
  right.className = "drawer-right";

  // Hero header (only above the list)
  var hero = document.createElement("div");
  hero.className = "drawer-hero";
  hero.innerHTML =
    '<img class="drawer-hero-img" src="' + s.cover + '" alt="" onerror="this.style.display=\'none\'">' +
    '<div class="drawer-hero-info">' +
      '<div class="title">' + s.title + '</div>' +
      '<div class="sub">' + s.subtitle + '</div>' +
      '<div class="authors">' + s.authors + '</div>' +
      pubTag(s.publisher) +
    '</div>';
  right.appendChild(hero);

  // Close button (top-right of drawer)
  var closeBtn = document.createElement("button");
  closeBtn.className = "drawer-close";
  closeBtn.innerHTML = "&times;";
  closeBtn.addEventListener("click", function(e) { e.stopPropagation(); closeDrawer(); });
  right.appendChild(closeBtn);

  // Volume list
  var list = document.createElement("div");
  list.className = "drawer-list";

  var firstOwned = -1;
  for (var j = 0; j < s.items.length; j++) {
    if (s.items[j].owned !== false && firstOwned < 0) firstOwned = j;
  }
  if (firstOwned < 0) firstOwned = 0;

  for (var j = 0; j < s.items.length; j++) {
    (function(item, jj) {
      var notOwned = item.owned === false;
      var el = document.createElement("div");
      el.className = "drawer-item" + (jj === firstOwned ? " active" : "") + (notOwned ? " not-owned" : "");

      var imgHtml = item.cover
        ? '<img src="' + item.cover + '" alt="" onerror="this.style.display=\'none\'">'
        : '<div style="width:36px;height:50px;background:#2a2a2a;border-radius:4px;flex-shrink:0"></div>';

      var statusHtml = notOwned
        ? '<span class="drawer-item-status status-missing">Not owned</span>'
        : '';

      el.innerHTML = imgHtml +
        '<div class="drawer-item-title">' + item.title + '</div>' +
        statusHtml;

      el.addEventListener("click", function() {
        activeItemIdx = jj;
        var items = list.querySelectorAll(".drawer-item");
        for (var k = 0; k < items.length; k++) items[k].classList.remove("active");
        el.classList.add("active");
        showPreview(item);
      });
      list.appendChild(el);
    })(s.items[j], j);
  }

  right.appendChild(list);
  drawer.appendChild(right);

  // Show first owned item preview
  showPreview(s.items[firstOwned]);

  document.getElementById("drawerOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function openSingle(singleItem) {
  var drawer = document.getElementById("drawer");
  drawer.innerHTML = "";
  drawer.className = "drawer single-mode";

  var closeBtn = document.createElement("button");
  closeBtn.className = "drawer-close";
  closeBtn.innerHTML = "&times;";
  closeBtn.addEventListener("click", function(e) { e.stopPropagation(); closeDrawer(); });
  drawer.appendChild(closeBtn);

  var preview = document.createElement("div");
  preview.className = "drawer-preview";
  preview.innerHTML =
    (singleItem.cover ? '<img src="' + singleItem.cover + '" alt="' + strip(singleItem.title) + '" onerror="this.style.display=\'none\'">' : '') +
    '<div class="drawer-preview-title">' + singleItem.title + '</div>' +
    '<div class="drawer-preview-authors">' + singleItem.authors + '</div>' +
    pubTag(singleItem.publisher) +
    (singleItem.desc ? '<div class="drawer-preview-desc">' + singleItem.desc + '</div>' : '');
  drawer.appendChild(preview);

  document.getElementById("drawerOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function showPreview(item) {
  var preview = document.getElementById("drawerPreview");
  if (!preview) return;
  preview.className = "drawer-preview";
  var notOwned = item.owned === false;

  var imgHtml = item.cover
    ? '<img src="' + item.cover + '" alt="' + strip(item.title) + '" onerror="this.style.display=\'none\'"' + (notOwned ? ' style="filter:grayscale(1);opacity:.5"' : '') + '>'
    : (notOwned ? '<div style="width:220px;height:330px;background:#1a1a1a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#444;font-size:.8rem">No cover</div>' : '');

  var statusHtml = notOwned
    ? '<div style="margin-top:.6rem"><span class="drawer-item-status status-missing" style="font-size:.7rem;padding:.2rem .5rem">Not owned</span></div>'
    : '';

  preview.innerHTML = imgHtml +
    '<div class="drawer-preview-title">' + item.title + '</div>' +
    statusHtml +
    (item.desc ? '<div class="drawer-preview-desc">' + item.desc + '</div>' : '');
}

function closeDrawer() {
  document.getElementById("drawerOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("drawerOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeDrawer();
});
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeDrawer(); });

function render() {
  var q = document.getElementById("search").value.toLowerCase();
  var pub = sel.value;

  var filtered = [];
  for (var i = 0; i < allEntries.length; i++) {
    var c = allEntries[i];
    var text = (c.title + strip(c.authors) + c.publisher + (c.subtitle || "")).toLowerCase();
    if (c.type === "series") {
      var itemText = "";
      for (var j = 0; j < c.items.length; j++) itemText += " " + c.items[j].title.toLowerCase();
      if ((!q || (text + itemText).indexOf(q) >= 0) && (!pub || c.publisher === pub)) filtered.push(c);
    } else {
      if ((!q || text.indexOf(q) >= 0) && (!pub || c.publisher === pub)) filtered.push(c);
    }
  }

  filtered.sort(function(a, b) {
    return strip(a.title || "").toLowerCase().localeCompare(strip(b.title || "").toLowerCase());
  });

  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  for (var i = 0; i < filtered.length; i++) {
    (function(c) {
      var card = document.createElement("div");
      card.className = "card";

      var safeTitle = strip(c.title).replace(/'/g, "").replace(/"/g, "");
      var coverHtml = c.cover
        ? '<img class="card-cover" src="' + c.cover + '" alt="' + safeTitle + '" loading="lazy" onerror="this.outerHTML=\'<div class=no-cover-card>' + safeTitle + '</div>\'">'
        : '<div class="no-cover-card">' + safeTitle + '</div>';

      var badge = c.type === "series"
        ? '<div class="series-indicator">' + c.items.length + ' vols</div>'
        : "";

      card.innerHTML = coverHtml + badge +
        '<div class="card-overlay">' +
          '<div class="title">' + c.title + '</div>' +
          '<div class="authors">' + c.authors + '</div>' +
          pubTag(c.publisher) +
        '</div>';

      card.style.cursor = "pointer";
      if (c.type === "series") {
        (function(idx) {
          card.addEventListener("click", function(e) {
            if (e.target.closest("a")) return;
            openDrawer(idx);
          });
        })(c.seriesIdx);
      } else {
        (function(item) {
          card.addEventListener("click", function(e) {
            if (e.target.closest("a")) return;
            openSingle(item);
          });
        })(c);
      }

      grid.appendChild(card);
    })(filtered[i]);
  }

  document.getElementById("count").textContent =
    "Showing " + filtered.length + " of " + allEntries.length + " titles";
}

document.getElementById("search").addEventListener("input", render);
sel.addEventListener("change", render);
render();
</script>
