<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Comic Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --card: #222;
      --accent: #ff4d6d;
      --accent2: #c9184a;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Hero header */
    .hero {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      background: linear-gradient(180deg, #1a1a2e 0%, var(--bg) 100%);
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #ff4d6d, #ff8fa3, #ff4d6d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { color: var(--muted); margin-top: .4rem; font-size: .95rem; }
    .stats {
      display: flex; justify-content: center; gap: 2rem; margin-top: 1.2rem;
    }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }

    /* Controls */
    .controls {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 1.5rem;
      display: flex; gap: .6rem; flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1; min-width: 220px; position: relative;
    }
    .search-wrap svg {
      position: absolute; left: .8rem; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--muted); pointer-events: none;
    }
    .controls input {
      width: 100%; padding: .65rem .8rem .65rem 2.4rem;
      border: 1px solid #333; border-radius: var(--radius);
      background: var(--surface); color: var(--text); font-size: .88rem;
      font-family: inherit; transition: border-color .2s;
    }
    .controls input:focus { outline: none; border-color: var(--accent); }
    .controls select {
      padding: .65rem .8rem; border: 1px solid #333; border-radius: var(--radius);
      background: var(--surface); color: var(--text); font-size: .88rem;
      font-family: inherit; min-width: 140px; cursor: pointer;
    }
    .controls select:focus { outline: none; border-color: var(--accent); }

    /* Grid — cover-focused */
    .grid {
      max-width: 1200px; margin: 0 auto; padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.2rem;
    }

    /* Cover card */
    .card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      cursor: default;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      z-index: 2;
    }
    .card-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: #2a2a2a;
      border-radius: var(--radius);
    }
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.92) 0%, rgba(0,0,0,.4) 40%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: .8rem;
      border-radius: var(--radius);
    }
    .card:hover .card-overlay { opacity: 1; }
    .card-overlay .title {
      font-size: .82rem; font-weight: 700; line-height: 1.2;
      margin-bottom: .2rem;
    }
    .card-overlay .authors {
      font-size: .68rem; color: #bbb; line-height: 1.3;
    }
    .card-overlay .tag {
      display: inline-block; margin-top: .3rem;
      background: var(--accent); color: #fff;
      padding: .12rem .4rem; border-radius: 4px;
      font-size: .6rem; font-weight: 600;
      text-decoration: none; width: fit-content;
    }
    .card-overlay .tag:hover { background: var(--accent2); }
    .card-overlay a { color: #ddd; text-decoration: none; border: none; }
    .card-overlay a:hover { color: #fff; }

    .series-indicator {
      position: absolute; top: .5rem; right: .5rem;
      background: var(--accent); color: #fff;
      font-size: .6rem; font-weight: 700;
      padding: .2rem .45rem; border-radius: 4px;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    .no-cover-card {
      width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(135deg, #1a1a2e, #2a2a4a);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; color: var(--muted); text-align: center;
      padding: .5rem;
    }

    /* Drawer */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: -440px;
      width: 420px; max-width: 92vw;
      height: 100vh; background: var(--surface);
      z-index: 101; transition: right .35s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
      box-shadow: -8px 0 40px rgba(0,0,0,.6);
    }
    .drawer-overlay.open .drawer { right: 0; }

    .drawer-hero {
      position: relative; padding: 0;
    }
    .drawer-hero-img {
      width: 100%; aspect-ratio: 16/9; object-fit: cover;
      filter: brightness(.5); display: block;
    }
    .drawer-hero-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.2rem; background: linear-gradient(0deg, var(--surface) 10%, transparent);
    }
    .drawer-hero-info .title { font-size: 1.3rem; font-weight: 700; }
    .drawer-hero-info .sub { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
    .drawer-hero-info .authors { font-size: .8rem; color: #bbb; margin-top: .3rem; }
    .drawer-hero-info .authors a { color: #ccc; border: none; }
    .drawer-hero-info .authors a:hover { color: var(--accent); }
    .drawer-hero-info .tag {
      display: inline-block; margin-top: .4rem;
      background: var(--accent); color: #fff;
      padding: .15rem .5rem; border-radius: 4px;
      font-size: .68rem; font-weight: 600;
      text-decoration: none;
    }
    .drawer-close {
      position: absolute; top: .8rem; right: .8rem;
      background: rgba(0,0,0,.5); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .drawer-close:hover { background: var(--accent); }

    .drawer-list { padding: .5rem 0; }
    .drawer-item {
      display: flex; gap: .8rem; padding: .7rem 1.2rem;
      align-items: center; transition: background .15s;
    }
    .drawer-item:hover { background: rgba(255,255,255,.04); }
    .drawer-item img {
      width: 44px; height: 62px; object-fit: cover;
      border-radius: 6px; background: #2a2a2a; flex-shrink: 0;
    }
    .drawer-item-num {
      width: 20px; font-size: .7rem; color: var(--muted);
      text-align: center; flex-shrink: 0;
    }
    .drawer-item-title { font-size: .85rem; font-weight: 500; }

    .count {
      text-align: center; color: var(--muted);
      padding: 2rem 1rem; font-size: .8rem;
    }

    @media (max-width: 700px) {
      .hero h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: .8rem; padding: 0 .8rem; }
      .controls { padding: 0 .8rem 1rem; }
      .drawer { width: 100vw; max-width: 100vw; }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>Comic Library</h1>
  <p>A personal collection</p>
  <div class="stats">
    <div><div class="stat-num" id="statEntries">0</div><div class="stat-label">Titles</div></div>
    <div><div class="stat-num" id="statVolumes">0</div><div class="stat-label">Volumes</div></div>
    <div><div class="stat-num" id="statPubs">0</div><div class="stat-label">Publishers</div></div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="Search comics...">
  </div>
  <select id="publisherFilter">
    <option value="">All Publishers</option>
  </select>
</div>

<div class="grid" id="grid"></div>
<p class="count" id="count"></p>

<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer" id="drawer"></div>
</div>

<script>
const W = (text, url) => url ? `<a href="${url}" target="_blank">${text}</a>` : text;
const wiki = "https://en.wikipedia.org/wiki/";
const pub_urls = {
  "Image": "https://imagecomics.com/",
  "Titan Comics": "https://titan-comics.com/",
  "Oni Press / IDW": "https://onipress.com/",
  "BOOM! Studios": "https://www.boom-studios.com/",
  "Avatar Press": wiki + "Avatar_Press",
  "Humanoids": "https://www.humanoids.com/",
  "Dark Horse": "https://www.darkhorse.com/",
  "Vertigo": wiki + "Vertigo_Comics",
  "Dynamite": "https://www.dynamite.com/",
  "Insight Comics": "https://insightcomics.com/",
  "Oni Press": "https://onipress.com/",
  "Ablaze": "https://ablaze.net/",
  "Marvel": "https://www.marvel.com/",
};

const singles = [
  { title: "Arrowsmith", authors: `${W("Kurt Busiek",wiki+"Kurt_Busiek")} / ${W("Carlos Pacheco",wiki+"Carlos_Pacheco")}`, publisher: "Image", cover: "covers/arrowsmith.jpg" },
  { title: "Azimut", authors: `${W("Wilfrid Lupano",wiki+"Wilfrid_Lupano")} & Andr\u00e9al`, publisher: "Titan Comics", cover: "covers/azimut.jpg" },
  { title: "Rick and Morty vs. D&amp;D", authors: `${W("Patrick Rothfuss",wiki+"Patrick_Rothfuss")} / ${W("Jim Zub",wiki+"Jim_Zub")}`, publisher: "Oni Press / IDW", cover: "covers/rick-morty-dnd.jpg" },
  { title: "Fevre Dream", authors: `${W("George R.R. Martin",wiki+"George_R._R._Martin")} / ${W("Daniel Abraham",wiki+"Daniel_Abraham_(author)")} / Rafa Lopez`, publisher: "Avatar Press", cover: "covers/fevre-dream.jpg" },
  { title: "Wolfskin", authors: `${W("Warren Ellis",wiki+"Warren_Ellis")} / ${W("Juan Jose Ryp",wiki+"Juan_Jose_Ryp")}`, publisher: "Avatar Press", cover: "covers/wolfskin.jpg" },
  { title: "Providence", authors: `${W("Alan Moore",wiki+"Alan_Moore")} / ${W("Jacen Burrows",wiki+"Jacen_Burrows")}`, publisher: "Avatar Press", cover: "covers/providence.jpg" },
  { title: "Cutting Edge", authors: `${W("Francesco Dimitri",wiki+"Francesco_Dimitri")} / Mario Alberti`, publisher: "Titan Comics", cover: "covers/cutting-edge.jpg" },
  { title: "Sap Hunters", authors: "Laurent Genefort / Alexandre Ristorcelli", publisher: "Humanoids", cover: "covers/sap-hunters.jpg" },
  { title: "The Heir", authors: "RB White", publisher: "", cover: "covers/the-heir.jpg" },
  { title: "Seven Suns", authors: "Robert Windom / Kelvin Mao", publisher: "", cover: "covers/seven-suns.jpg" },
  { title: "StarHenge: The Dragon and the Boar", authors: W("Liam Sharp",wiki+"Liam_Sharp"), publisher: "Image", cover: "covers/starhenge.jpg" },
  { title: "Buyan", authors: "Martin Etxeberria / Xabier Etxeberria / Aritz Trueba", publisher: "Insight Comics", cover: "covers/buyan.jpg" },
  { title: "Dryad", authors: `${W("Kurtis J. Wiebe",wiki+"Kurtis_J._Wiebe")} / Justin Barcelo`, publisher: "Oni Press", cover: "covers/dryad.jpg" },
  { title: "Legends of the Pierced Veil", authors: "Saverio Tenuta / Bruno Letizia / Carita Lupattelli", publisher: "Humanoids", cover: "covers/legends-pierced-veil.jpg" },
  { title: "Sapiens Imperium", authors: "Sam Timel / Jorge Miguel", publisher: "Humanoids", cover: "covers/sapiens-imperium.jpg" },
  { title: "Saga (6 issues)", authors: `${W("Brian K. Vaughan",wiki+"Brian_K._Vaughan")} / ${W("Fiona Staples",wiki+"Fiona_Staples")}`, publisher: "Image", cover: "covers/saga.jpg" },
  { title: "The Dresden Files", authors: W("Jim Butcher",wiki+"Jim_Butcher"), publisher: "Dynamite", cover: "covers/dresden-files.jpg" },
  { title: "American Gods: Shadows (#1)", authors: `${W("Neil Gaiman",wiki+"Neil_Gaiman")} / ${W("P. Craig Russell",wiki+"P._Craig_Russell")}`, publisher: "Dark Horse", cover: "covers/american-gods-shadows.jpg" },
  { title: "Wretches Vol 1", authors: W("James E. Roche", wiki+"James_E._Roche"), publisher: "", cover: "covers/wretches.jpg" },
  { title: "The Unwritten", authors: `${W("Mike Carey",wiki+"Mike_Carey_(writer)")} / ${W("Peter Gross",wiki+"Peter_Gross_(comics)")}`, publisher: "Vertigo", cover: "covers/unwritten.jpg" },
  { title: "Elves Vol 1", authors: `${W("Jean-Luc Istin",wiki+"Jean-Luc_Istin")} / Nicolas Jarry`, publisher: "Humanoids", cover: "covers/elves.jpg" },
  { title: "Star Wars", authors: `${W("Jason Aaron",wiki+"Jason_Aaron")} / ${W("Leinil Francis Yu",wiki+"Leinil_Francis_Yu")} / Jorge Molina / Mike Mayhew`, publisher: "Marvel", cover: "covers/star-wars.jpg" },
];

const series = [
  {
    title: "Fables", subtitle: "Vol 1\u20139 + Werewolves",
    authors: `${W("Bill Willingham",wiki+"Bill_Willingham")} / ${W("Mark Buckingham",wiki+"Mark_Buckingham")}`,
    publisher: "Vertigo", cover: "covers/fables-1.jpg",
    items: [
      { title: "Vol 1: Legends in Exile", cover: "covers/fables-1.jpg" },
      { title: "Vol 2: Animal Farm", cover: "covers/fables-2.jpg" },
      { title: "Vol 3: Storybook Love", cover: "covers/fables-3.jpg" },
      { title: "Vol 4: March of the Wooden Soldiers", cover: "covers/fables-4.jpg" },
      { title: "Vol 5: The Mean Seasons", cover: "covers/fables-5.jpg" },
      { title: "Vol 6: Homelands", cover: "covers/fables-6.jpg" },
      { title: "Vol 7: Arabian Nights (and Days)", cover: "covers/fables-7.jpg" },
      { title: "Vol 8: Wolves", cover: "covers/fables-8.jpg" },
      { title: "Vol 9: Sons of Empire", cover: "covers/fables-9.jpg" },
      { title: "Werewolves of the Heartland", cover: "covers/fables-werewolves.jpg" },
    ]
  },
  {
    title: "Injection", subtitle: "Vol 1\u20133",
    authors: `${W("Warren Ellis",wiki+"Warren_Ellis")} / ${W("Declan Shalvey",wiki+"Declan_Shalvey")}`,
    publisher: "Image", cover: "covers/injection.jpg",
    items: [
      { title: "Vol 1", cover: "covers/injection.jpg" },
      { title: "Vol 2", cover: "covers/injection-2.jpg" },
      { title: "Vol 3", cover: "covers/injection-3.jpg" },
    ]
  },
  {
    title: "Dune", subtitle: "Vol 1\u20132",
    authors: `${W("Brian Herbert",wiki+"Brian_Herbert")} / ${W("Kevin J. Anderson",wiki+"Kevin_J._Anderson")}`,
    publisher: "BOOM! Studios", cover: "covers/dune-1.jpg",
    items: [
      { title: "Vol 1: House Atreides", cover: "covers/dune-1.jpg" },
      { title: "Vol 2: House Harkonnen", cover: "covers/dune-2.jpg" },
    ]
  },
  {
    title: "Monstress", subtitle: "Vol 1\u20132",
    authors: `${W("Marjorie Liu",wiki+"Marjorie_Liu")} / ${W("Sana Takeda",wiki+"Sana_Takeda")}`,
    publisher: "Image", cover: "covers/monstress-1.jpg",
    items: [
      { title: "Vol 1: Awakening", cover: "covers/monstress-1.jpg" },
      { title: "Vol 2: The Blood", cover: "covers/monstress-2.jpg" },
    ]
  },
  {
    title: "Conan (Dark Horse)", subtitle: "Vol 1\u20133",
    authors: `${W("Kurt Busiek",wiki+"Kurt_Busiek")} / ${W("Cary Nord",wiki+"Cary_Nord")}`,
    publisher: "Dark Horse", cover: "covers/conan-1.jpg",
    items: [
      { title: "Vol 1: The Frost Giant\u2019s Daughter", cover: "covers/conan-1.jpg" },
      { title: "Vol 2: The God in the Bowl", cover: "covers/conan-2.jpg" },
      { title: "Vol 3: The Tower of the Elephant", cover: "covers/conan-3.jpg" },
    ]
  },
  {
    title: "The Cimmerian", subtitle: "Vol 1\u20134",
    authors: "Various",
    publisher: "Ablaze", cover: "covers/cimmerian-1.jpg",
    items: [
      { title: "Vol 1", cover: "covers/cimmerian-1.jpg" },
      { title: "Vol 2", cover: "covers/cimmerian-2.jpg" },
      { title: "Vol 3", cover: "covers/cimmerian-3.jpg" },
      { title: "Vol 4", cover: "covers/cimmerian-4.jpg" },
    ]
  },
  {
    title: "Vei", subtitle: "Vol 1\u20132",
    authors: `${W("Sara Bergmark Elfgren",wiki+"Sara_Bergmark_Elfgren")} / Karl Johnsson`,
    publisher: "Insight Comics", cover: "covers/vei-1.jpg",
    items: [
      { title: "Vol 1", cover: "covers/vei-1.jpg" },
      { title: "Vol 2", cover: "covers/vei-2.jpg" },
    ]
  },
  {
    title: "Rat Queens", subtitle: "Vol 1\u20135",
    authors: `${W("Kurtis J. Wiebe",wiki+"Kurtis_J._Wiebe")} / Roc Upchurch`,
    publisher: "Image", cover: "covers/rat-queens-1.jpg",
    items: [
      { title: "Vol 1: Sass & Sorcery", cover: "covers/rat-queens-1.jpg" },
      { title: "Vol 2: The Far Reaching Tentacles of N\u2019Rygoth", cover: "covers/rat-queens-2.jpg" },
      { title: "Vol 3: Demons", cover: "covers/rat-queens-3.jpg" },
      { title: "Vol 4: High Fantasies", cover: "covers/rat-queens-4.jpg" },
      { title: "Vol 5: The Colossal Magic Nothing", cover: "covers/rat-queens-5.jpg" },
    ]
  },
  {
    title: "Tales of Dunk and Egg", subtitle: "2 books",
    authors: W("George R.R. Martin",wiki+"George_R._R._Martin"),
    publisher: "", cover: "covers/hedge-knight.jpg",
    items: [
      { title: "The Hedge Knight", cover: "covers/hedge-knight.jpg" },
      { title: "The Mystery Knight", cover: "covers/mystery-knight.jpg" },
    ]
  },
  {
    title: "The Complete ElfQuest", subtitle: "Vol 1\u20133",
    authors: `${W("Wendy Pini",wiki+"Wendy_Pini")} / ${W("Richard Pini",wiki+"Richard_Pini")}`,
    publisher: "Dark Horse", cover: "covers/elfquest-1.jpg",
    items: [
      { title: "Vol 1", cover: "covers/elfquest-1.jpg" },
      { title: "Vol 2", cover: "covers/elfquest-2.jpg" },
      { title: "Vol 3", cover: "covers/elfquest-3.jpg" },
    ]
  },
];

// Combine for filtering
const allEntries = [
  ...singles.map(s => ({ ...s, type: "single" })),
  ...series.map((s, i) => ({ ...s, type: "series", seriesIdx: i })),
];

// Stats
const totalVols = singles.length + series.reduce((n, s) => n + s.items.length, 0);
const allPubs = [...new Set(allEntries.map(c => c.publisher).filter(Boolean))].sort();
document.getElementById("statEntries").textContent = allEntries.length;
document.getElementById("statVolumes").textContent = totalVols;
document.getElementById("statPubs").textContent = allPubs.length;

// Publisher filter
const sel = document.getElementById("publisherFilter");
allPubs.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; sel.appendChild(o); });

function strip(html) { return html.replace(/<[^>]*>/g, ""); }

function pubTag(publisher) {
  if (!publisher) return "";
  const url = pub_urls[publisher];
  return url
    ? `<a class="tag" href="${url}" target="_blank">${publisher}</a>`
    : `<span class="tag">${publisher}</span>`;
}

// Drawer
function openDrawer(idx) {
  var s = series[idx];
  if (!s) return;
  var drawer = document.getElementById("drawer");
  drawer.innerHTML = "";

  var hero = document.createElement("div");
  hero.className = "drawer-hero";
  hero.innerHTML = `
    <img class="drawer-hero-img" src="${s.cover}" alt="" onerror="this.style.display='none'">
    <div class="drawer-hero-info">
      <div class="title">${s.title}</div>
      <div class="sub">${s.subtitle}</div>
      <div class="authors">${s.authors}</div>
      ${pubTag(s.publisher)}
    </div>
  `;
  var closeBtn = document.createElement("button");
  closeBtn.className = "drawer-close";
  closeBtn.innerHTML = "&times;";
  closeBtn.addEventListener("click", function(e) { e.stopPropagation(); closeDrawer(); });
  hero.appendChild(closeBtn);
  drawer.appendChild(hero);

  var list = document.createElement("div");
  list.className = "drawer-list";
  s.items.forEach(function(item, i) {
    var el = document.createElement("div");
    el.className = "drawer-item";
    el.innerHTML = `
      <div class="drawer-item-num">${i + 1}</div>
      <img src="${item.cover}" alt="" onerror="this.style.display='none'">
      <div class="drawer-item-title">${item.title}</div>
    `;
    list.appendChild(el);
  });
  drawer.appendChild(list);

  document.getElementById("drawerOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDrawer() {
  document.getElementById("drawerOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("drawerOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeDrawer();
});
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeDrawer(); });

function render() {
  var q = document.getElementById("search").value.toLowerCase();
  var pub = sel.value;

  var filtered = allEntries.filter(function(c) {
    var text = (c.title + strip(c.authors) + c.publisher + (c.subtitle || "")).toLowerCase();
    if (c.type === "series") {
      var itemText = c.items.map(function(i) { return i.title.toLowerCase(); }).join(" ");
      return (!q || (text + " " + itemText).indexOf(q) >= 0) && (!pub || c.publisher === pub);
    }
    return (!q || text.indexOf(q) >= 0) && (!pub || c.publisher === pub);
  });

  filtered.sort(function(a, b) {
    return strip(a.title || "").toLowerCase().localeCompare(strip(b.title || "").toLowerCase());
  });

  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  filtered.forEach(function(c) {
    var card = document.createElement("div");
    card.className = "card";

    var coverHtml = c.cover
      ? '<img class="card-cover" src="' + c.cover + '" alt="' + strip(c.title) + '" loading="lazy" onerror="this.outerHTML=\'<div class=no-cover-card>' + strip(c.title).replace(/'/g, "") + '</div>\'">'
      : '<div class="no-cover-card">' + strip(c.title) + '</div>';

    var badge = c.type === "series"
      ? '<div class="series-indicator">' + c.items.length + ' vols</div>'
      : "";

    card.innerHTML = coverHtml + badge + `
      <div class="card-overlay">
        <div class="title">${c.title}</div>
        <div class="authors">${c.authors}</div>
        ${pubTag(c.publisher)}
      </div>`;

    if (c.type === "series") {
      card.style.cursor = "pointer";
      (function(idx) {
        card.addEventListener("click", function(e) {
          if (e.target.closest("a")) return;
          openDrawer(idx);
        });
      })(c.seriesIdx);
    }

    grid.appendChild(card);
  });

  document.getElementById("count").textContent =
    "Showing " + filtered.length + " of " + allEntries.length + " titles";
}

document.getElementById("search").addEventListener("input", render);
sel.addEventListener("change", render);
render();
</script>
</body>
</html>
